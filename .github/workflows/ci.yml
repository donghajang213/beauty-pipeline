# ─────────────────────────────────────────────────────────────
# 파일: .github/workflows/ci.yml
# 역할: PR/푸시마다 GitHub 서버에서 자동으로 품질 검사 실행 (CI = 지속적 통합)
# 왜: "내 컴퓨터에선 됐는데"를 차단한다 — 깨끗한 가상 머신에서 uv.lock 그대로 재현해
#     lint/테스트가 통과해야만 병합할 수 있게 만드는 관문(gate).
#     지금까지 손으로 하던 `ruff check` + `pytest`를 기계가 대신하는 것.
# ─────────────────────────────────────────────────────────────

name: CI

# 트리거: main으로 향하는 PR + main에 직접 푸시될 때
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest # GitHub이 제공하는 일회용 리눅스 VM (public repo는 무료)

    steps:
      # 1) 저장소 코드를 VM으로 내려받기
      - uses: actions/checkout@v4

      # 2) uv 설치 — 로컬과 같은 도구를 CI에서도 쓴다 (환경 이원화 방지)
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # 의존성 캐시 — 매번 새로 받지 않아 CI가 빨라진다

      # 3) uv.lock에 고정된 "정확히 같은 버전"으로 의존성 설치
      #    --frozen: lock 파일과 pyproject가 어긋나면 실패 (몰래 버전이 바뀌는 것 방지)
      - name: Install dependencies
        run: uv sync --frozen

      # 4) 린트 — 코드 규칙 위반 검사 (RULES.md 3장)
      - name: Lint (ruff check)
        run: uv run ruff check .

      # 5) 포맷 검사 — 자동 정렬이 안 된 파일이 있으면 실패
      - name: Format check (ruff format)
        run: uv run ruff format --check .

      # 6) 단위 테스트 — 외부 API는 전부 mock이라 시크릿 없이 돈다
      - name: Test (pytest)
        run: uv run pytest -q
