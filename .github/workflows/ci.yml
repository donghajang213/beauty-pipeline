# ─────────────────────────────────────────────────────────────
# 파일: .github/workflows/ci.yml
# 역할: PR/푸시마다 GitHub 서버에서 자동으로 품질 검사 실행 (CI = 지속적 통합)
# 왜: "내 컴퓨터에선 됐는데"를 차단한다 — 깨끗한 가상 머신에서 uv.lock 그대로 재현해
#     lint/테스트가 통과해야만 병합할 수 있게 만드는 관문(gate).
#     지금까지 손으로 하던 `ruff check` + `pytest`를 기계가 대신하는 것.
# ─────────────────────────────────────────────────────────────

name: CI

# 트리거: main으로 향하는 PR + main에 직접 푸시될 때
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest # GitHub이 제공하는 일회용 리눅스 VM (public repo는 무료)

    steps:
      # 1) 저장소 코드를 VM으로 내려받기
      - uses: actions/checkout@v4

      # 2) uv 설치 — 로컬과 같은 도구를 CI에서도 쓴다 (환경 이원화 방지)
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # 의존성 캐시 — 매번 새로 받지 않아 CI가 빨라진다

      # 3) uv.lock에 고정된 "정확히 같은 버전"으로 의존성 설치
      #    --frozen: lock 파일과 pyproject가 어긋나면 실패 (몰래 버전이 바뀌는 것 방지)
      - name: Install dependencies
        run: uv sync --frozen

      # 4) 린트 — 코드 규칙 위반 검사 (RULES.md 3장)
      - name: Lint (ruff check)
        run: uv run ruff check .

      # 5) 포맷 검사 — 자동 정렬이 안 된 파일이 있으면 실패
      - name: Format check (ruff format)
        run: uv run ruff format --check .

      # 6) 단위 테스트 — 외부 API는 전부 mock이라 시크릿 없이 돈다
      - name: Test (pytest)
        run: uv run pytest -q

  # ─────────────────────────────────────────────
  # 보안 게이트 (Phase 3, RULES.md 4.3) — 하나라도 걸리면 병합 불가
  # 3종이 각각 다른 층을 지킨다:
  #   gitleaks = git 이력 속 시크릿 / Bandit = 파이썬 코드의 위험 패턴 / Trivy = 컨테이너 취약점
  # ─────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks는 "전체 커밋 이력"을 뒤진다 — 과거에 묻힌 키도 잡기 위해

      # 1) 시크릿 스캔 — API 키/토큰이 커밋됐는지 이력 전체 검사
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # PR에 결과 코멘트를 달기 위한 기본 토큰

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen

      # 2) SAST(정적 분석) — 인젝션·하드코딩 비밀번호 등 위험 코드 패턴
      #    제외 규칙(B311/B608)과 그 근거는 pyproject.toml [tool.bandit]에 문서화
      - name: SAST (Bandit)
        run: uv run bandit -c pyproject.toml -r ingestion api

      # 3) 컨테이너 취약점 스캔 — 배포 이미지를 CI에서 빌드해 검사
      - name: Build API image for scan
        run: docker build -t api-scan:ci -f api/Dockerfile .

      - name: Image scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: api-scan:ci
          severity: HIGH,CRITICAL # 이 등급이 발견되면
          exit-code: "1" # 실패 처리 = 병합 차단
          ignore-unfixed: true # 아직 패치가 없는 취약점은 제외 (조치 불가능한 경보는 소음)
